services:
  - type: web
    name: portfolio-mohammed-kaif
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: PORTFOLIO_ADMIN_TOKEN
        generateValue: true
